name: "Build and Publish"

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "**.md"
      - ".github/workflows/ci.yaml"
      - "renovate.json5"
  schedule:
    # Always run at least once a month to regularly rebuild the image .
    - cron: "0 0 1 * *"
  workflow_dispatch:

env:
  REGISTRY: "ghcr.io"
  IMAGE_NAME: "djmattyg007/jsonnet"

jobs:
  main:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      packages: "write"

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

      - name: "Set up QEMU"
        uses: "docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a" # v4.0.0

      - name: "Set up Docker Buildkit"
        uses: "docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd" # v4.0.0

      - name: "Log in to the container registry"
        uses: "docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2" # v4.0.0
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.repository_owner }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Get version for image tag"
        id: "get-version"
        run: |
          echo "version=$(grep -m1 'JSONNET_VERSION' < Dockerfile | awk -F "\"" '{print $2}')" >> "${GITHUB_OUTPUT}"
        shell: "bash"

      - name: "Extract metadata (tags, labels) for Docker"
        id: "meta"
        uses: "docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf" # v6.0.0
        with:
          images: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          tags: |
            type=semver,pattern={{version}},value=${{ steps.get-version.outputs.version }}

      - name: "Build and push image"
        uses: "docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294" # v7.0.0
        with:
          context: "."
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
          platforms: "linux/amd64,linux/arm64,linux/arm/v7"
